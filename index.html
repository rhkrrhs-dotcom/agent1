<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Work Triage Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Work Triage Board</p>
          <h1>오늘 업무 정리</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="exportMarkdown" title="Markdown 내보내기" aria-label="Markdown 내보내기">
            <span aria-hidden="true">↓</span>
          </button>
          <button class="icon-button" id="clearDone" title="완료 항목 정리" aria-label="완료 항목 정리">
            <span aria-hidden="true">✓</span>
          </button>
        </div>
      </header>

      <section class="workspace">
        <aside class="capture-panel">
          <form id="captureForm">
            <label for="noteInput">업무 메모</label>
            <textarea id="noteInput" name="noteInput" spellcheck="false">민지: 견적서 초안 오늘 5시까지 확인
내일 오전 고객사 미팅 자료 업데이트
세금계산서 발행 여부 확인 필요
다음 주 월요일까지 계약서 검토 요청
Slack에 런칭 일정 공유</textarea>
            <div class="form-row">
              <button class="primary-button" type="submit">정리하기</button>
              <button class="secondary-button" type="button" id="addBlank">직접 추가</button>
            </div>
          </form>

          <div class="stats-grid" aria-label="업무 현황">
            <div>
              <span id="totalCount">0</span>
              <p>전체</p>
            </div>
            <div>
              <span id="todayCount">0</span>
              <p>오늘</p>
            </div>
            <div>
              <span id="doneCount">0</span>
              <p>완료</p>
            </div>
          </div>

          <section class="translator-panel" aria-label="ChatGPT 번역">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">ChatGPT</p>
                <h2>번역</h2>
              </div>
              <span class="status-pill" id="translateStatus">준비</span>
            </div>
            <label for="translateInput">번역할 내용</label>
            <textarea id="translateInput" spellcheck="false" placeholder="번역할 문장을 입력하세요."></textarea>
            <div class="translate-options">
              <label for="targetLanguage">
                <span>언어</span>
                <select id="targetLanguage">
                  <option value="English">영어</option>
                  <option value="Korean">한국어</option>
                  <option value="Japanese">일본어</option>
                  <option value="Chinese">중국어</option>
                  <option value="Spanish">스페인어</option>
                </select>
              </label>
              <label for="translateTone">
                <span>톤</span>
                <select id="translateTone">
                  <option value="business">업무용</option>
                  <option value="polite">정중하게</option>
                  <option value="simple">쉽게</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <button class="primary-button" type="button" id="translateButton">번역하기</button>
              <button class="secondary-button" type="button" id="loadNoteForTranslate">메모 가져오기</button>
            </div>
            <label for="translateOutput">번역 결과</label>
            <textarea id="translateOutput" readonly placeholder="결과가 여기에 표시됩니다."></textarea>
            <div class="form-row">
              <button class="secondary-button" type="button" id="copyTranslation">복사</button>
              <button class="secondary-button" type="button" id="useTranslationAsNote">메모로 사용</button>
            </div>
          </section>
        </aside>

        <section class="board" aria-label="업무 보드">
          <div class="board-toolbar">
            <div class="segmented" role="tablist" aria-label="보기">
              <button class="segment active" type="button" data-filter="all">전체</button>
              <button class="segment" type="button" data-filter="today">오늘</button>
              <button class="segment" type="button" data-filter="week">이번 주</button>
            </div>
            <label class="search-box">
              <span>검색</span>
              <input id="searchInput" type="search" autocomplete="off">
            </label>
          </div>

          <div class="columns" id="columns">
            <section class="column" data-status="todo">
              <header>
                <h2>해야 함</h2>
                <span class="count" id="todoCount">0</span>
              </header>
              <div class="task-list" id="todoList"></div>
            </section>
            <section class="column" data-status="doing">
              <header>
                <h2>진행 중</h2>
                <span class="count" id="doingCount">0</span>
              </header>
              <div class="task-list" id="doingList"></div>
            </section>
            <section class="column" data-status="done">
              <header>
                <h2>완료</h2>
                <span class="count" id="doneColumnCount">0</span>
              </header>
              <div class="task-list" id="doneList"></div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <template id="taskTemplate">
      <article class="task-card">
        <div class="task-head">
          <input class="task-title" aria-label="업무 제목">
          <button class="delete-button" type="button" title="삭제" aria-label="삭제">×</button>
        </div>
        <div class="task-meta">
          <label>
            <span>담당</span>
            <input class="owner-input" aria-label="담당자">
          </label>
          <label>
            <span>마감</span>
            <input class="due-input" aria-label="마감일">
          </label>
        </div>
        <div class="task-actions">
          <button type="button" data-move="todo">해야 함</button>
          <button type="button" data-move="doing">진행 중</button>
          <button type="button" data-move="done">완료</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
